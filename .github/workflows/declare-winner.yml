name: Humble Hero - Auto Declare Winners

on:
  schedule:
    - cron: '*/2 * * * *'   # Every 2 minutes
  workflow_dispatch:

jobs:
  declare-winners:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run declare winner script
        env:
          BASE_RPC: ${{ secrets.BASE_RPC }}
          ESCROW_CONTRACT_ADDRESS: ${{ secrets.ESCROW_CONTRACT_ADDRESS }}
          ADMIN_PRIVATE_KEY: ${{ secrets.ADMIN_PRIVATE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/declareWinners.js
